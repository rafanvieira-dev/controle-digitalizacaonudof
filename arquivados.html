<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Guias Arquivadas</title>
</head>
<body>
  <h1>Guias Arquivadas</h1>
  
  <table id="tabelaArquivados">
    <thead>
      <tr>
        <th>Número da Guia</th>
        <th>Hora de Entrada</th>
        <th>Unidade</th>
        <th>Data de Recebimento</th>
        <th>Status</th>
        <th>Data de Arquivamento</th>
        <th>Pasta</th>
      </tr>
    </thead>
    <tbody>
      <!-- As guias arquivadas serão inseridas aqui -->
    </tbody>
  </table>

  <script>
    // Recupera as guias arquivadas do localStorage
    const guias = JSON.parse(localStorage.getItem("guias")) || [];

    // Função para renderizar as guias arquivadas
    function renderizarArquivados() {
      const tabela = document.getElementById("tabelaArquivados").getElementsByTagName('tbody')[0];
      tabela.innerHTML = "";

      guias.filter(g => g.status === "Arquivada").forEach(g => {
        tabela.innerHTML += `
          <tr>
            <td>${g.numeroGuia}</td>
            <td>${g.horaEntrada}</td>
            <td>${g.unidade}</td>
            <td>${g.dataRecebimento}</td>
            <td>${g.status}</td>
            <td>${g.dataArquivamento}</td>
            <td>${g.pasta}</td>
          </tr>
        `;
      });
    }

    renderizarArquivados();
  </script>
</body>
</html>
