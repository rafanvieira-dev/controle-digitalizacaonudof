<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Guias Arquivadas</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <h1>Guias Arquivadas</h1>

  <ul id="tabelaArquivados">
    <!-- Guias arquivadas serão exibidas aqui -->
  </ul>

  <button onclick="window.location.href='index.html'">Voltar</button>

  <script>
    const guias = JSON.parse(localStorage.getItem("guias")) || [];

    function renderizarArquivados() {
      const tabela = document.getElementById('tabelaArquivados');
      tabela.innerHTML = "";

      guias.filter(g => g.status === "Arquivada").forEach(g => {
        const item = document.createElement('li');
        item.innerHTML = `
          <p><strong>Número da Guia:</strong> ${g.numeroGuia}</p>
          <p><strong>Status:</strong> ${g.status}</p>
          <p><strong>Data de Arquivamento:</strong> ${g.dataArquivamento}</p>
          <p><strong>Pasta:</strong> ${g.pasta}</p>
          <button onclick="visualizarDocumentos('${g.numeroGuia}')">Ver Documentos</button>
        `;
        tabela.appendChild(item);
      });
    }

    function visualizarDocumentos(numeroGuia) {
      window.location.href = `documentos.html?numeroGuia=${numeroGuia}`;
    }

    renderizarArquivados();
  </script>
</body>
</html>
