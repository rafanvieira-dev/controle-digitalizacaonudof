<style>
    /* Estilos anteriores mantidos */
    .alerta-atraso {
        background: #e74c3c; color: white; padding: 2px 8px; border-radius: 4px;
        font-size: 0.7em; font-weight: bold; margin-left: 10px; animation: blink 1s infinite;
    }
    @keyframes blink { 0% { opacity: 1; } 50% { opacity: 0.5; } 100% { opacity: 1; } }
</style>

<script type="module">
    // ... (imports permanecem os mesmos)

    async function carregarMenuGuias() {
        const lista = document.getElementById("listaGuias");
        try {
            const q = query(collection(db, "guias"), where("status", "!=", "Arquivada"));
            const snap = await getDocs(q);
            
            let guias = [];
            for (const d of snap.docs) {
                const docsSnap = await getDocs(collection(db, "guias", d.id, "documentos"));
                guias.push({ id: d.id, qtdDocs: docsSnap.size, ...d.data() });
            }

            // MODIFICAÇÃO: Ordenar por data (MAIS ANTIGO PRIMEIRO)
            guias.sort((a, b) => (a.dataRecebimento || "").localeCompare(b.dataRecebimento || ""));

            const contagemPorData = {};
            guias.forEach(g => {
                const dRec = g.dataRecebimento || "Sem Data";
                contagemPorData[dRec] = (contagemPorData[dRec] || 0) + 1;
            });

            lista.innerHTML = "";
            let dataAtual = "";
            let divGrupo = null;

            guias.forEach(g => {
                // Lógica de Alerta: Mais de 1 dia (24h)
                const dataRec = new Date(g.dataRecebimento + "T00:00:00");
                const hoje = new Date();
                hoje.setHours(0,0,0,0);
                const diffTempo = hoje - dataRec;
                const diffDias = diffTempo / (1000 * 60 * 60 * 24);
                const alertaHtml = diffDias >= 1 ? `<span class="alerta-atraso">⚠️ ATENÇÃO</span>` : "";

                if (g.dataRecebimento !== dataAtual) {
                    dataAtual = g.dataRecebimento;
                    const dataF = dataAtual !== "Sem Data" ? dataAtual.split('-').reverse().join('/') : "Sem Data";
                    const idGrupo = `grupo-ins-${dataAtual.replace(/\//g, '-')}`;
                    const totalGuias = contagemPorData[dataAtual];

                    const btnData = document.createElement("button");
                    btnData.className = "data-header-btn";
                    btnData.innerHTML = `
                        <div>
                            <span>📅 Recebidas em: ${dataF}</span>
                            <span class="contador-abas">${totalGuias} guia(s)</span>
                            ${alertaHtml}
                        </div>
                        <span>➕</span>`;
                    
                    divGrupo = document.createElement("div");
                    divGrupo.className = "grupo-guias-inserir";
                    divGrupo.id = idGrupo;
                    divGrupo.style.display = "none";
                    divGrupo.style.flexWrap = "wrap"; divGrupo.style.gap = "10px";

                    btnData.onclick = () => {
                        const target = document.getElementById(idGrupo);
                        const icon = btnData.querySelector('span:last-child');
                        if (target.style.display === "none") {
                            target.style.display = "flex";
                            icon.innerText = "➖";
                        } else {
                            target.style.display = "none";
                            icon.innerText = "➕";
                        }
                    };

                    lista.appendChild(btnData);
                    lista.appendChild(divGrupo);
                }

                const btnGuia = document.createElement("button");
                btnGuia.className = "btn-guia-item";
                btnGuia.innerHTML = `Guia: ${g.numero || g.numeroGuia} <span class="badge-docs">${g.qtdDocs}</span>`;
                btnGuia.onclick = () => window.iniciarInclusao(g.id, `Guia: ${g.numero || g.numeroGuia}`);
                divGrupo.appendChild(btnGuia);
            });
        } catch (e) { console.error(e); lista.innerHTML = "Erro ao carregar guias."; }
    }
    // ... (restante do script mantido)
</script>
