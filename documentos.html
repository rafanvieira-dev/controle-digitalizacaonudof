<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Adicionar Documentos</title>
  <link rel="stylesheet" href="style.css">
  <style>
    /* Estilo para manter tudo centralizado e bem organizado */
    body {
      font-family: Arial, sans-serif;
      background-color: #f5f5f5;
      color: #333;
      text-align: center;
      padding: 20px;
    }

    .container {
      width: 80%;
      margin: 0 auto;
    }

    h1 {
      color: #006747;
      margin-bottom: 20px;
    }

    .documentos {
      list-style: none;
      padding: 0;
      text-align: left;
    }

    .documentos li {
      background-color: #fff;
      padding: 10px;
      margin: 5px 0;
      border: 1px solid #ddd;
      border-radius: 5px;
    }

    .documentos li:hover {
      background-color: #e9e9e9;
    }

    button {
      background-color: #006747;
      color: white;
      padding: 10px 20px;
      border: none;
      border-radius: 5px;
      cursor: pointer;
      margin-top: 20px;
    }

    button:hover {
      background-color: #004d3a;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>Adicionar Documentos à Guia</h1>

    <div id="infoGuia">
      <!-- Informações da guia serão exibidas aqui -->
    </div>

    <form id="formDocumento">
      <label for="nomeDoc">Nome do Documento:</label>
      <input type="text" id="nomeDoc" required>

      <label for="tipoDoc">Tipo de Documento:</label>
      <input type="text" id="tipoDoc" required>

      <label for="paginasDoc">Número de Páginas:</label>
      <input type="number" id="paginasDoc" required>

      <label for="obsDoc">Observação:</label>
      <textarea id="obsDoc"></textarea>

      <button type="submit">Salvar Documento</button>
    </form>

    <button onclick="window.location.href='index.html'">Voltar</button>

    <h2>Documentos da Guia</h2>
    <ul id="listaDocumentos" class="documentos">
      <!-- A lista de documentos será exibida aqui -->
    </ul>
  </div>

  <script>
    const guias = JSON.parse(localStorage.getItem("guias")) || [];
    const numeroGuia = new URLSearchParams(window.location.search).get("numeroGuia");

    const guia = guias.find(g => g.numeroGuia === numeroGuia);

    if (guia) {
      document.getElementById('infoGuia').innerHTML = `
        <p><strong>Número da Guia:</strong> ${guia.numeroGuia}</p>
        <p><strong>Status:</strong> ${guia.status}</p>
        <p><strong>Observação:</strong> ${guia.observacao}</p>
      `;
      
      // Exibe os documentos da guia
      const listaDocumentos = document.getElementById('listaDocumentos');
      guia.documentos.forEach(doc => {
        const item = document.createElement('li');
        item.textContent = `${doc.nome} - Tipo: ${doc.tipo} - Páginas: ${doc.paginas}`;
        listaDocumentos.appendChild(item);
      });
    }

    document.getElementById("formDocumento").addEventListener("submit", function(e){
      e.preventDefault();

      if (guia.documentos.length >= 6) {
        alert("Limite de documentos atingido!");
        return;
      }

      // Adiciona o documento à guia
      guia.documentos.push({
        nome: document.getElementById("nomeDoc").value,
        tipo: document.getElementById("tipoDoc").value,
        paginas: document.getElementById("paginasDoc").value,
        status: "Pendente",
        observacao: document.getElementById("obsDoc").value
      });

      localStorage.setItem("guias", JSON.stringify(guias));
      alert("Documento adicionado com sucesso!");
      location.reload(); // Atualiza a página para mostrar o novo documento
    });
  </script>
</body>
</html>
