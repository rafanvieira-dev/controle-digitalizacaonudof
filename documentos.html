<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Adicionar Documentos</title>
</head>
<body>
  <h1>Adicionar Documentos à Guia</h1>
  <form id="formDocumento">
    <label for="guiaDoc">Número da Guia:</label>
    <input type="text" id="guiaDoc" required>

    <label for="nomeDoc">Nome do Documento:</label>
    <input type="text" id="nomeDoc" required>

    <label for="tipoDoc">Tipo de Documento:</label>
    <input type="text" id="tipoDoc" required>

    <label for="paginasDoc">Número de Páginas:</label>
    <input type="number" id="paginasDoc" required>

    <label for="obsDoc">Observação:</label>
    <textarea id="obsDoc"></textarea>

    <button type="submit">Salvar Documento</button>
  </form>

  <script>
    const guias = JSON.parse(localStorage.getItem("guias")) || [];
    const documentos = JSON.parse(localStorage.getItem("documentos")) || [];

    document.getElementById("formDocumento").addEventListener("submit", function(e){
      e.preventDefault();

      const numeroGuia = document.getElementById("guiaDoc").value;
      const guia = guias.find(g => g.numeroGuia === numeroGuia);

      if (!guia) {
        alert("Guia não encontrada!");
        return;
      }

      const novoDocumento = {
        numeroGuia: numeroGuia,
        nome: document.getElementById("nomeDoc").value,
        tipo: document.getElementById("tipoDoc").value,
        paginas: document.getElementById("paginasDoc").value,
        status: "Pendente",
        observacao: document.getElementById("obsDoc").value,
      };

      documentos.push(novoDocumento);
      localStorage.setItem("documentos", JSON.stringify(documentos));
      alert("Documento salvo!");
    });
  </script>
</body>
</html>
