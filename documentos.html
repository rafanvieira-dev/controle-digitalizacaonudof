<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inserir Documentos - NUDOF</title>
    <link rel="stylesheet" href="style.css">
    <style>
        /* Mantendo seus estilos de abas e botões */
        .data-header-btn {
            width: 100%; background: #003366; color: white; padding: 12px;
            border: none; border-radius: 5px; text-align: left; font-weight: bold;
            margin: 15px 0 5px 0; cursor: pointer; display: flex; justify-content: space-between;
            align-items: center;
        }
        .contador-abas {
            background: #4682B4; color: white; padding: 2px 10px; border-radius: 12px;
            font-size: 0.85em; margin-left: 10px; font-weight: normal;
        }
        .grupo-guias-inserir { display: none; margin-bottom: 20px; padding: 10px; background: #f9f9f9; border-radius: 0 0 8px 8px; }
        .btn-guia-item {
            padding: 10px 20px; margin: 5px; border: none; border-radius: 4px;
            background: #4682B4; color: white; cursor: pointer; font-weight: bold;
        }
        /* Ajuste de rolagem que você pediu */
        body { overflow-y: auto !important; height: auto !important; }
    </style>
</head>
<body>

    <div id="appInterface" style="display: flex;">
        <aside id="sidebar">
            <div class="logo">SISTEMA NUDOF</div>
            <nav>
                <a href="index.html">🏠 Início / Histórico</a>
                <a href="guia.html">➕ Inserir Nova Guia</a>
                <a href="documentos.html" style="background-color: #d0d0d0; font-weight: bold;">📄 Documentos em Guia</a>
                <a href="documentosRecebidos.html">📁 Arquivar Guia</a>
                <a href="documentosArquivados.html">📚 Guias Arquivadas</a>
                <button id="btnLogout" style="color: #e74c3c; background:none; border:none; border-top: 1px solid #ccc; margin-top: auto; padding: 15px; cursor:pointer; width: 100%; text-align: left;">🚪 Sair</button>
            </nav>
        </aside>

        <main id="content">
            <h2 class="page-title">Inserir Documentos na Guia</h2>

            <div class="form-container">
                <h3>Selecione a Guia de Destino</h3>
                <div id="listaGuiasAgrupadas">
                    <p>Carregando guias...</p>
                </div>
            </div>

            <div id="areaDocumentos" style="display:none; margin-top: 20px; border-top: 2px solid #003366; padding-top: 20px;">
                <h3 id="tituloGuia" style="color: #003366; margin-bottom: 15px;"></h3>
                
                <div class="form-container">
                    <form id="formDocumento">
                        <input type="hidden" id="docIdEdicao">
                        <label>Nome do Documento:</label>
                        <input type="text" id="nomeDocumento" required>

                        <label>Nº do Processo SEI:</label>
                        <input type="text" id="numeroProcesso" required>

                        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 15px;">
                            <div><label>Data de Recebimento:</label><input type="date" id="dataRecebimento" required></div>
                            <div><label>Guia de Remessa:</label><input type="text" id="guiaRemessa" required></div>
                        </div>

                        <button type="submit" class="btn-primary" id="btnSalvar" style="margin-top: 15px;">Gravar Documento</button>
                        <button type="button" id="btnCancelarEdicao" style="display:none; background: #7f8c8d;" class="btn-primary">Cancelar Edição</button>
                    </form>
                    <p id="contadorDocs" style="margin-top: 15px; font-weight: bold; color: #d35400;">0 / 7 documentos</p>
                </div>

                <div class="form-container">
                    <h3>Documentos na Ordem de Digitalização:</h3>
                    <div id="listaDocumentos" style="margin-top: 10px;"></div>
                </div>
            </div>
        </main>
    </div>

    <script type="module">
        import { db, auth } from "./firebase.js";
        import { 
            collection, getDocs, addDoc, query, where, doc, 
            deleteDoc, updateDoc, orderBy, serverTimestamp 
        } from "https://www.gstatic.com/firebasejs/12.9.0/firebase-firestore.js";
        import { onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/12.9.0/firebase-auth.js";

        let guiaAtivaId = "";
        let docEmEdicaoId = null;

        onAuthStateChanged(auth, (user) => {
            if (!user) window.location.href = "index.html";
            else carregarMenuGuias();
        });

        document.getElementById("btnLogout").onclick = () => signOut(auth);

        async function carregarMenuGuias() {
            const container = document.getElementById("listaGuiasAgrupadas");
            try {
                const q = query(collection(db, "guias"), where("status", "!=", "Arquivada"));
                const snap = await getDocs(q);
                container.innerHTML = "";
                
                // Agrupando por data (seu layout original)
                const grupos = {};
                snap.forEach(d => {
                    const data = d.data().dataRecebimento || "Sem Data";
                    if (!grupos[data]) grupos[data] = [];
                    grupos[data].push({ id: d.id, ...d.data() });
                });

                Object.keys(grupos).sort().reverse().forEach(data => {
                    const secao = document.createElement("div");
                    secao.innerHTML = `<button class="data-header-btn" onclick="this.nextElementSibling.style.display = this.nextElementSibling.style.display === 'block' ? 'none' : 'block'">
                        Data: ${data} <span class="contador-abas">${grupos[data].length} guias</span>
                    </button>
                    <div class="grupo-guias-inserir"></div>`;
                    
                    const divBotoes = secao.querySelector(".grupo-guias-inserir");
                    grupos[data].forEach(g => {
                        const btn = document.createElement("button");
                        btn.className = "btn-guia-item";
                        btn.innerText = "Guia " + (g.numero || g.numeroGuia);
                        btn.onclick = () => iniciarInclusao(g.id, btn.innerText);
                        divBotoes.appendChild(btn);
                    });
                    container.appendChild(secao);
                });
            } catch (e) { container.innerHTML = "Erro ao carregar."; }
        }

        window.iniciarInclusao = (id, texto) => {
            guiaAtivaId = id;
            document.getElementById("areaDocumentos").style.display = "block";
            document.getElementById("tituloGuia").innerText = texto;
            atualizarListaDocumentos(id);
        };

        window.atualizarListaDocumentos = async (id) => {
            const container = document.getElementById("listaDocumentos");
            try {
                // AQUI ESTÁ A CORREÇÃO: Ordem de inserção correta
                const qDocs = query(collection(db, "guias", id, "documentos"), orderBy("dataInsercao", "asc"));
                const snap = await getDocs(qDocs);
                container.innerHTML = "";
                snap.forEach(docSnap => {
                    const d = docSnap.data();
                    const item = document.createElement("div");
                    item.style = "padding: 10px; border-bottom: 1px solid #eee; display: flex; justify-content: space-between;";
                    item.innerHTML = `<div><strong>${d.nomeDocumento}</strong> - SEI: ${d.numeroProcesso}</div>
                    <div><button onclick="prepararEdicao('${docSnap.id}','${d.nomeDocumento}','${d.numeroProcesso}','${d.dataRecebimento}','${d.guiaRemessa}')">✏️</button>
                    <button onclick="excluirDoc('${docSnap.id}')">❌</button></div>`;
                    container.appendChild(item);
                });
                document.getElementById("contadorDocs").innerText = `${snap.size} / 7 documentos`;
            } catch (e) { console.error(e); }
        };

        document.getElementById("formDocumento").onsubmit = async (e) => {
            e.preventDefault();
            const dados = {
                nomeDocumento: document.getElementById("nomeDocumento").value,
                numeroProcesso: document.getElementById("numeroProcesso").value,
                dataRecebimento: document.getElementById("dataRecebimento").value,
                guiaRemessa: document.getElementById("guiaRemessa").value,
                ultimaAtualizacao: serverTimestamp()
            };

            if (docEmEdicaoId) {
                await updateDoc(doc(db, "guias", guiaAtivaId, "documentos", docEmEdicaoId), dados);
            } else {
                dados.dataInsercao = serverTimestamp();
                await addDoc(collection(db, "guias", guiaAtivaId, "documentos"), dados);
            }
            document.getElementById("formDocumento").reset();
            docEmEdicaoId = null;
            document.getElementById("btnCancelarEdicao").style.display = "none";
            document.getElementById("btnSalvar").innerText = "Gravar Documento";
            atualizarListaDocumentos(guiaAtivaId);
        };

        window.prepararEdicao = (id, nome, sei, data, guia) => {
            docEmEdicaoId = id;
            document.getElementById("nomeDocumento").value = nome;
            document.getElementById("numeroProcesso").value = sei;
            document.getElementById("dataRecebimento").value = data;
            document.getElementById("guiaRemessa").value = guia;
            document.getElementById("btnSalvar").innerText = "Atualizar";
            document.getElementById("btnCancelarEdicao").style.display = "inline-block";
        };

        window.excluirDoc = async (id) => {
            if (confirm("Excluir item?")) {
                await deleteDoc(doc(db, "guias", guiaAtivaId, "documentos", id));
                atualizarListaDocumentos(guiaAtivaId);
            }
        };
    </script>
</body>
</html>
