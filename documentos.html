<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Documentos por Guia</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<h2>Guias Cadastradas</h2>

<a href="index.html" class="voltar">⬅ Voltar</a>

<ul id="listaGuias"></ul>

<hr>

<div id="areaDocumentos" style="display:none;">

    <h3 id="tituloGuia"></h3>

    <form id="formDocumento">

        <input type="text" id="nomeDocumento" placeholder="Nome do Documento" required>

        <input type="text" id="numeroProcesso" placeholder="Nº do Processo SEI" required>

        <input type="date" id="dataRecebimento" required>

        <input type="text" id="guiaRemessa" placeholder="Guia de Remessa" required>

        <button type="submit">Adicionar Documento</button>

    </form>

    <p id="contadorDocs">0 / 7 documentos</p>

    <h3>Lista de Documentos</h3>
    <ul id="listaDocumentos"></ul>

</div>

<script type="module" src="documentos.js"></script>

</body>
</html>
