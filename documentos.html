<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inserir Documentos - NUDOF</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="appInterface">
        <aside id="sidebar">
            <div class="sidebar-logo">CONTROLE DIGITALIZAÇÃO DE DOCUMENTOS NUDOF</div>
            <nav>
                <a href="index.html">🏠 Início / Histórico</a>
                <a href="guia.html">➕ Nova Guia</a>
                <a href="documentos.html" class="ativo">📄 Inserir Documentos</a>
                <a href="documentosRecebidos.html">📁 Arquivar Guia</a>
                <a href="documentosArquivados.html">📚 Guias Arquivadas</a>
                <button id="btnLogout" class="btn-sair">🚪 Sair do Sistema</button>
            </nav>
        </aside>

        <main id="content">
            <h2 class="page-title">Inserir Documentos na Guia</h2>
            <div class="form-container">
                <h3>1. Selecione a Guia de Destino</h3>
                <div id="listaGuias" style="margin-top: 15px;"><p>Buscando guias abertas...</p></div>
            </div>

            <div id="areaDocumentos" style="display:none;">
                <h3 id="tituloGuia" style="color: #003366; margin-bottom: 15px; border-top: 1px solid #ccc; padding-top: 20px;"></h3>
                <div class="form-container">
                    <form id="formDocumento">
                        <label>Nome do Documento:</label>
                        <input type="text" id="nomeDocumento" placeholder="Ex: Ofício de Encaminhamento" required>

                        <label>Nº do Processo SEI:</label>
                        <input type="text" id="numeroProcesso" placeholder="Ex: 00000.000/2026-00">

                        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 15px;">
                            <div>
                                <label>Data de Recebimento:</label>
                                <input type="date" id="dataRecebimento" required>
                            </div>
                            <div>
                                <label>Guia de Remessa:</label>
                                <input type="text" id="guiaRemessa" placeholder="Nº da Guia" required>
                            </div>
                        </div>

                        <div style="display: flex; gap: 10px;">
                            <button type="submit" class="btn-primary" id="btnSalvar">Gravar Documento</button>
                            <button type="button" id="btnCancelarEdicao" onclick="window.cancelarEdicao()" style="display: none; background: #7f8c8d; color: white; padding: 12px 20px; border-radius: 4px; cursor: pointer; font-weight: bold;">Cancelar Edição</button>
                        </div>
                    </form>
                    <p id="contadorDocs">0 / 7 documentos cadastrados</p>
                </div>

                <div class="form-container">
                    <h3>Itens inseridos nesta guia:</h3>
                    <ul id="listaDocumentos" class="sei-table" style="list-style: none; padding: 0; margin-top: 10px;"></ul>
                </div>
            </div>
        </main>
    </div>

    <script type="module">
        import { db, auth } from "./firebase.js";
        import { collection, getDocs, addDoc, updateDoc, doc, query, where } from "https://www.gstatic.com/firebasejs/12.9.0/firebase-firestore.js";
        import { onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/12.9.0/firebase-auth.js";

        let guiaAtivaId = "";
        let docEmEdicaoId = null; 

        onAuthStateChanged(auth, (user) => { if (!user) window.location.href = "index.html"; else carregarMenuGuias(); });
        document.getElementById("btnLogout").onclick = () => signOut(auth);

        async function carregarMenuGuias() {
            const lista = document.getElementById("listaGuias");
            try {
                const q = query(collection(db, "guias"), where("status", "!=", "Arquivada"));
                const snap = await getDocs(q);
                let guias = [];
                snap.forEach(d => guias.push({ id: d.id, ...d.data() }));
                guias.sort((a, b) => (b.dataRecebimento || "").localeCompare(a.dataRecebimento || ""));

                lista.innerHTML = "";
                let dataAtual = "";
                let divGrupo = null;

                guias.forEach(g => {
                    if (g.dataRecebimento !== dataAtual) {
                        dataAtual = g.dataRecebimento;
                        const tituloData = document.createElement("h4");
                        tituloData.innerText = "📅 " + (dataAtual ? dataAtual.split('-').reverse().join('/') : "Sem Data");
                        lista.appendChild(tituloData);
                        divGrupo = document.createElement("div");
                        divGrupo.style.display = "flex"; divGrupo.style.flexWrap = "wrap"; divGrupo.style.gap = "10px";
                        lista.appendChild(divGrupo);
                    }
                    const btn = document.createElement("button");
                    btn.innerText = "Guia: " + (g.numero || g.numeroGuia);
                    btn.className = "btn-primary"; btn.style.width = "auto"; btn.style.background = "#4682B4";
                    btn.onclick = () => window.iniciarInclusao(g.id, btn.innerText);
                    divGrupo.appendChild(btn);
                });
            } catch (e) { lista.innerHTML = "Erro ao carregar guias."; }
        }

        window.iniciarInclusao = async function(id, texto) {
            guiaAtivaId = id; window.cancelarEdicao(); 
            document.getElementById("areaDocumentos").style.display = "block";
            document.getElementById("tituloGuia").innerText = texto;
            await window.atualizarListaDocumentos(id);
        };

        window.atualizarListaDocumentos = async function(id) {
            const container = document.getElementById("listaDocumentos");
            const contador = document.getElementById("contadorDocs");
            try {
                const snap = await getDocs(collection(db, "guias", id, "documentos"));
                container.innerHTML = ""; 
                snap.forEach(docSnap => {
                    const d = docSnap.data();
                    const li = document.createElement("li");
                    li.innerHTML = `<div><strong>${d.nomeDocumento}</strong> (SEI: ${d.numeroProcesso || 'Não informado'})</div>`;
                    const btnEditar = document.createElement("button");
                    btnEditar.innerText = "✏️ Editar"; btnEditar.onclick = () => window.prepararEdicao(docSnap.id, d);
                    li.appendChild(btnEditar);
                    container.appendChild(li);
                });
                contador.innerText = `${snap.size} / 7 documentos`;
            } catch (e) { console.error(e); }
        }

        window.prepararEdicao = (id, d) => {
            docEmEdicaoId = id;
            document.getElementById("nomeDocumento").value = d.nomeDocumento;
            document.getElementById("numeroProcesso").value = d.numeroProcesso;
            document.getElementById("dataRecebimento").value = d.dataRecebimento;
            document.getElementById("guiaRemessa").value = d.guiaRemessa;
            document.getElementById("btnSalvar").innerText = "🔄 Atualizar";
            document.getElementById("btnCancelarEdicao").style.display = "block";
        };

        window.cancelarEdicao = () => {
            docEmEdicaoId = null; document.getElementById("formDocumento").reset();
            document.getElementById("btnSalvar").innerText = "Gravar Documento";
            document.getElementById("btnCancelarEdicao").style.display = "none";
        };

        document.getElementById("formDocumento").onsubmit = async (e) => {
            e.preventDefault();
            const docDados = {
                nomeDocumento: document.getElementById("nomeDocumento").value,
                numeroProcesso: document.getElementById("numeroProcesso").value,
                dataRecebimento: document.getElementById("dataRecebimento").value,
                guiaRemessa: document.getElementById("guiaRemessa").value,
                ultimaAtualizacao: new Date(),
                atualizadoPor: auth.currentUser.email // QUEM ATUALIZOU
            };

            try {
                if (docEmEdicaoId) {
                    await updateDoc(doc(db, "guias", guiaAtivaId, "documentos", docEmEdicaoId), docDados);
                    alert("Atualizado!");
                } else {
                    docDados.dataInsercao = new Date();
                    docDados.inseridoPor = auth.currentUser.email; // QUEM INSERIU O ITEM
                    await addDoc(collection(db, "guias", guiaAtivaId, "documentos"), docDados);
                    alert("Documento inserido!");
                }
                window.cancelarEdicao(); 
                window.atualizarListaDocumentos(guiaAtivaId);
            } catch (err) { alert("Erro ao salvar."); }
        };
    </script>
</body>
</html>
