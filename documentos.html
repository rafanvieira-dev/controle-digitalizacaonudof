<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inserir Documentos - NUDOF</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="appInterface">
        <aside id="sidebar">
            <div class="sidebar-logo">CONTROLE DIGITALIZAÇÃO DE DOCUMENTOS NUDOF</div>
            <nav>
                <a href="index.html">🏠 Início / Histórico</a>
                <a href="guia.html">➕ Nova Guia</a>
                <a href="documentos.html" class="ativo">📄 Inserir Documentos</a>
                <a href="documentosRecebidos.html">📁 Arquivar Guia</a>
                <a href="documentosArquivados.html">📚 Guias Arquivadas</a>
                <button id="btnLogout" class="btn-sair">🚪 Sair do Sistema</button>
            </nav>
        </aside>

        <main id="content">
            <h2 class="page-title">Inserir Documentos na Guia</h2>

            <div class="form-container">
                <h3>1. Selecione a Guia de Destino</h3>
                <div id="listaGuias" style="display: flex; flex-wrap: wrap; gap: 10px; margin-top: 15px;">
                    <p>Buscando guias abertas...</p>
                </div>
            </div>

            <div id="areaDocumentos" style="display:none;">
                <h3 id="tituloGuia" style="color: #003366; margin-bottom: 15px; border-top: 1px solid #ccc; padding-top: 20px;"></h3>
                
                <div class="form-container">
                    <form id="formDocumento">
                        <label>Nome do Documento:</label>
                        <input type="text" id="nomeDocumento" placeholder="Ex: Ofício de Encaminhamento" required>

                        <label>Nº do Processo SEI (Opcional nesta fase):</label>
                        <input type="text" id="numeroProcesso" placeholder="Ex: 00000.000/2026-00">

                        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 15px;">
                            <div>
                                <label>Data de Recebimento:</label>
                                <input type="date" id="dataRecebimento" required>
                            </div>
                            <div>
                                <label>Guia de Remessa:</label>
                                <input type="text" id="guiaRemessa" placeholder="Nº da Guia" required>
                            </div>
                        </div>

                        <div style="display: flex; gap: 10px;">
                            <button type="submit" class="btn-primary" id="btnSalvar">Gravar Documento na Guia</button>
                            <button type="button" id="btnCancelarEdicao" onclick="window.cancelarEdicao()" style="display: none; background: #7f8c8d; color: white; border: none; padding: 12px 20px; border-radius: 4px; cursor: pointer; font-weight: bold; width: 100%;">Cancelar Edição</button>
                        </div>
                    </form>
                    <p id="contadorDocs">0 / 7 documentos cadastrados</p>
                </div>

                <div class="form-container">
                    <h3>Itens inseridos nesta guia:</h3>
                    <ul id="listaDocumentos" class="sei-table" style="list-style: none; padding: 0; margin-top: 10px;"></ul>
                </div>
            </div>
        </main>
    </div>

    <script type="module">
        import { db, auth } from "./firebase.js";
        import { collection, getDocs, addDoc, updateDoc, doc, query, where } from "https://www.gstatic.com/firebasejs/12.9.0/firebase-firestore.js";
        import { onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/12.9.0/firebase-auth.js";

        let guiaAtivaId = "";
        let docEmEdicaoId = null; 

        onAuthStateChanged(auth, (user) => { 
            if (!user) window.location.href = "index.html"; 
            else carregarMenuGuias();
        });
        document.getElementById("btnLogout").onclick = () => signOut(auth);

        async function carregarMenuGuias() {
            const lista = document.getElementById("listaGuias");
            try {
                const q = query(collection(db, "guias"), where("status", "!=", "Arquivada"));
                const snap = await getDocs(q);
                lista.innerHTML = "";
                snap.forEach(docSnap => {
                    const g = docSnap.data();
                    const btn = document.createElement("button");
                    btn.innerText = "Guia: " + (g.numero || g.numeroGuia);
                    btn.className = "btn-primary";
                    btn.style.width = "auto";
                    btn.style.background = "#4682B4";
                    btn.onclick = () => iniciarInclusao(docSnap.id, btn.innerText);
                    lista.appendChild(btn);
                });
            } catch (e) { lista.innerHTML = "Erro ao carregar guias."; }
        }

        window.iniciarInclusao = async function(id, texto) {
            guiaAtivaId = id;
            window.cancelarEdicao(); 
            document.getElementById("areaDocumentos").style.display = "block";
            document.getElementById("tituloGuia").innerText = texto;
            await atualizarListaDocumentos(id);
            document.getElementById("areaDocumentos").scrollIntoView({ behavior: 'smooth' });
        };

        window.atualizarListaDocumentos = async function(id) {
            const container = document.getElementById("listaDocumentos");
            const contador = document.getElementById("contadorDocs");
            
            try {
                const snap = await getDocs(collection(db, "guias", id, "documentos"));
                container.innerHTML = ""; 
                
                snap.forEach(docSnap => {
                    const d = docSnap.data();
                    const li = document.createElement("li");
                    
                    const infoDiv = document.createElement("div");
                    // O texto foi alterado aqui
                    const numSei = d.numeroProcesso ? d.numeroProcesso : "<span style='color:#e74c3c;'>Informar número processo SEI</span>";
                    infoDiv.innerHTML = `<span><strong>${d.nomeDocumento}</strong></span> <span style="margin-left: 15px; color: #666;">SEI: ${numSei}</span>`;
                    
                    const btnEditar = document.createElement("button");
                    btnEditar.innerHTML = "✏️ Editar";
                    btnEditar.style.background = "#f39c12";
                    btnEditar.style.color = "white";
                    btnEditar.style.border = "none";
                    btnEditar.style.padding = "6px 12px";
                    btnEditar.style.borderRadius = "4px";
                    btnEditar.style.cursor = "pointer";
                    btnEditar.style.fontWeight = "bold";
                    
                    btnEditar.onclick = () => window.prepararEdicao(docSnap.id, d.nomeDocumento, d.numeroProcesso, d.dataRecebimento, d.guiaRemessa);

                    li.appendChild(infoDiv);
                    li.appendChild(btnEditar);
                    container.appendChild(li);
                });

                contador.innerText = `${snap.size} / 7 documentos cadastrados`;
                
                if (snap.size >= 7 && !docEmEdicaoId) {
                    document.getElementById("btnSalvar").disabled = true;
                    document.getElementById("btnSalvar").innerText = "Limite de 7 atingido";
                    document.getElementById("btnSalvar").style.background = "#95a5a6";
                } else if (!docEmEdicaoId) {
                    document.getElementById("btnSalvar").disabled = false;
                    document.getElementById("btnSalvar").innerText = "Gravar Documento na Guia";
                    document.getElementById("btnSalvar").style.background = "var(--primary)";
                }
            } catch (e) { console.error(e); }
        }

        window.prepararEdicao = function(id, nome, sei, data, guia) {
            docEmEdicaoId = id;
            document.getElementById("nomeDocumento").value = nome || "";
            document.getElementById("numeroProcesso").value = sei || "";
            document.getElementById("dataRecebimento").value = data || "";
            document.getElementById("guiaRemessa").value = guia || "";

            document.getElementById("btnSalvar").innerText = "🔄 Atualizar Documento";
            document.getElementById("btnSalvar").disabled = false;
            document.getElementById("btnSalvar").style.background = "#f39c12"; 
            document.getElementById("btnCancelarEdicao").style.display = "block";
            
            document.getElementById("tituloGuia").scrollIntoView({ behavior: 'smooth' });
        };

        window.cancelarEdicao = function() {
            docEmEdicaoId = null;
            document.getElementById("formDocumento").reset();
            
            document.getElementById("btnSalvar").innerText = "Gravar Documento na Guia";
            document.getElementById("btnSalvar").style.background = "var(--primary)";
            document.getElementById("btnCancelarEdicao").style.display = "none";
            
            window.atualizarListaDocumentos(guiaAtivaId); 
        };

        document.getElementById("formDocumento").onsubmit = async (e) => {
            e.preventDefault();
            
            const docDados = {
                nomeDocumento: document.getElementById("nomeDocumento").value,
                numeroProcesso: document.getElementById("numeroProcesso").value,
                dataRecebimento: document.getElementById("dataRecebimento").value,
                guiaRemessa: document.getElementById("guiaRemessa").value,
                ultimaAtualizacao: new Date(),
                atualizadoPor: auth.currentUser.email
            };

            try {
                if (docEmEdicaoId) {
                    const docRef = doc(db, "guias", guiaAtivaId, "documentos", docEmEdicaoId);
                    await updateDoc(docRef, docDados);
                    alert("Documento atualizado com sucesso!");
                } else {
                    docDados.dataInsercao = new Date();
                    docDados.criadoPor = auth.currentUser.email;
                    await addDoc(collection(db, "guias", guiaAtivaId, "documentos"), docDados);
                    alert("Documento inserido na guia!");
                }
                
                window.cancelarEdicao(); 
                
            } catch (err) { 
                alert("Erro ao salvar documento: " + err.message); 
            }
        };
    </script>
</body>
</html>
