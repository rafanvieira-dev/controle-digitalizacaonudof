<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Arquivar Guia - NUDOF</title>
    <link rel="stylesheet" href="style.css">
    <style>
        .guia-card-arquivar {
            background: #fff; padding: 20px; border-radius: 8px; margin-bottom: 15px;
            display: flex; justify-content: space-between; align-items: center;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1); border-left: 6px solid #27ae60;
        }
        .data-separator {
            background: #e8f4fd; color: #003366; font-weight: bold; padding: 10px;
            text-align: center; border-radius: 5px; margin: 20px 0 10px 0; border: 1px solid #b6d4fe;
        }
        .input-error { border: 2px solid #e74c3c !important; background: #fdf2f2; }
    </style>
</head>
<body>
    <div id="appInterface">
        <aside id="sidebar">
            <div class="sidebar-logo">CONTROLE DIGITALIZAÇÃO NUDOF</div>
            <nav>
                <a href="index.html">🏠 Início / Histórico</a>
                <a href="guia.html">➕ Nova Guia</a>
                <a href="documentos.html">📄 Inserir Documentos</a>
                <a href="documentosRecebidos.html" class="ativo">📁 Arquivar Guia</a>
                <a href="documentosArquivados.html">📚 Guias Arquivadas</a>
                <button id="btnLogout" class="btn-sair">🚪 Sair</button>
            </nav>
        </aside>

        <main id="content">
            <h2 class="page-title">Digitalização e Arquivamento Final</h2>
            <div id="listaGuiasParaArquivar">
                <p>Buscando guias prontas para arquivar...</p>
            </div>
        </main>
    </div>

    <div id="modalArquivar" class="modal">
        <div class="modal-content" style="width: 90%; max-width: 1000px;">
            <span id="closeArquivar" class="close-btn">&times;</span>
            <h3>Finalizar Processo de Digitalização</h3>
            <hr>
            
            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-top: 15px;">
                <div class="input-group">
                    <label>Localização da Caixa (Guia):</label>
                    <input type="text" id="locCaixa" placeholder="Ex: Prateleira A1">
                </div>
                <div class="input-group">
                    <label>Localização da Caixa (Documentos):</label>
                    <input type="text" id="locCaixaDocs" placeholder="Ex: Arquivo Geral">
                </div>
            </div>

            <div id="containerDocsParaDados" style="margin-top: 20px;">
                </div>

            <button id="btnConfirmarArquivamento" class="btn-primary" style="margin-top: 20px; background: #27ae60;">
                ✅ Confirmar e Arquivar no Sistema
            </button>
        </div>
    </div>

    <script type="module">
        import { db, auth } from "./firebase.js";
        import { collection, getDocs, query, where, doc, updateDoc, getDoc } from "https://www.gstatic.com/firebasejs/12.9.0/firebase-firestore.js";

        let guiaAtualId = "";
        let documentosDaGuia = [];

        async function carregar() {
            const q = query(collection(db, "guias"), where("status", "==", "Aberta"));
            const snap = await getDocs(q);
            const container = document.getElementById("listaGuiasParaArquivar");
            container.innerHTML = snap.empty ? "<p>Nenhuma guia pendente.</p>" : "";

            snap.forEach(g => {
                const d = g.data();
                const card = document.createElement("div");
                card.className = "guia-card-arquivar";
                card.innerHTML = `
                    <div>
                        <strong>Guia: ${d.numero}</strong><br>
                        <small>Unidade: ${d.unidade}</small>
                    </div>
                    <button class="btn-primary" onclick="abrirArquivamento('${g.id}', '${d.numero}')">Digitalizar</button>
                `;
                container.appendChild(card);
            });
        }

        window.abrirArquivamento = async (id, numero) => {
            guiaAtualId = id;
            documentosDaGuia = [];
            const docsSnap = await getDocs(collection(db, "guias", id, "documentos"));
            
            let html = `
                <table class="sei-table">
                    <thead>
                        <tr>
                            <th>Documento</th>
                            <th>SEI Digitalizado (Obrigatório)</th>
                            <th>Págs</th>
                            <th>Anexo (Mídia)</th>
                            <th>Obs.</th>
                        </tr>
                    </thead>
                    <tbody>`;

            docsSnap.forEach(docItem => {
                const dd = docItem.data();
                documentosDaGuia.push(docItem.id);
                html += `
                    <tr>
                        <td>${dd.nomeDocumento}</td>
                        <td><input type="text" id="sei_${docItem.id}" class="valida-sei" placeholder="Nº SEI"></td>
                        <td><input type="number" id="pags_${docItem.id}" style="width:60px" value="1"></td>
                        <td>
                            <select id="tAnexo_${docItem.id}">
                                <option value="Nenhum">Nenhum</option>
                                <option value="CD">CD</option>
                                <option value="DVD">DVD</option>
                                <option value="PenDrive">Pen Drive</option>
                            </select>
                        </td>
                        <td><input type="text" id="obs_${docItem.id}" placeholder="..."></td>
                    </tr>`;
            });

            document.getElementById("containerDocsParaDados").innerHTML = html + "</tbody></table>";
            document.getElementById("modalArquivar").style.display = "block";
        };

        document.getElementById("btnConfirmarArquivamento").onclick = async () => {
            const btn = document.getElementById("btnConfirmarArquivamento");
            
            // --- TRAVA DE SEGURANÇA ---
            let erros = 0;
            const camposSei = document.querySelectorAll(".valida-sei");
            
            camposSei.forEach(campo => {
                if (campo.value.trim() === "") {
                    campo.classList.add("input-error");
                    erros++;
                } else {
                    campo.classList.remove("input-error");
                }
            });

            if (erros > 0) {
                alert("ERRO: É obrigatório informar o Número do Processo SEI de TODOS os documentos para arquivar.");
                return;
            }

            btn.disabled = true;
            btn.innerText = "Processando...";

            try {
                // Atualiza Guia Pai
                await updateDoc(doc(db, "guias", guiaAtualId), {
                    status: "Arquivada",
                    locCaixaFinal: document.getElementById("locCaixa").value,
                    locCaixaDocumentos: document.getElementById("locCaixaDocs").value,
                    dataArquivamentoSistema: new Date().toLocaleDateString('pt-BR'),
                    arquivadoPor: auth.currentUser.email
                });

                // Atualiza Documentos Filhos
                const promessas = documentosDaGuia.map(docId => {
                    return updateDoc(doc(db, "guias", guiaAtualId, "documentos", docId), {
                        protocoloSeiDigitalizado: document.getElementById(`sei_${docId}`).value,
                        paginasPdf: document.getElementById(`pags_${docId}`).value,
                        tipoAnexo: document.getElementById(`tAnexo_${docId}`).value,
                        observacaoDigitalizacao: document.getElementById(`obs_${docId}`).value,
                        dataDigitalizacao: new Date().toLocaleDateString('pt-BR')
                    });
                });

                await Promise.all(promessas);
                alert("Guia e Documentos arquivados com sucesso!");
                location.reload();
            } catch (err) {
                alert("Erro ao salvar.");
                btn.disabled = false;
            }
        };

        document.getElementById("closeArquivar").onclick = () => document.getElementById("modalArquivar").style.display = "none";
        carregar();
    </script>
</body>
</html>
