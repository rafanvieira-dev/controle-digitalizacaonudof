<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Arquivar Guia - NUDOF</title>
    <link rel="stylesheet" href="style.css">
    <style>
        .guia-card-arquivar {
            background: #fff; padding: 20px; border-radius: 8px; margin-bottom: 15px;
            display: flex; justify-content: space-between; align-items: center;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1); border-left: 6px solid #27ae60;
        }
        .form-grid-arquivar { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; text-align: left; }
        .input-group label { display: block; font-weight: bold; font-size: 13px; margin-bottom: 5px; color: #34495e; }
    </style>
</head>
<body>
    <div id="appInterface">
        <aside id="sidebar">
            <div class="sidebar-logo">NUDOF DIGITAL</div>
            <nav>
                <a href="index.html">🏠 Início / Histórico</a>
                <a href="guia.html">➕ Nova Guia</a>
                <a href="documentos.html">📄 Inserir Documentos</a>
                <a href="documentosRecebidos.html" class="ativo">📁 Arquivar Guia</a>
                <a href="documentosArquivados.html">📚 Guias Arquivadas</a>
                <button id="btnLogout" class="btn-sair">🚪 Sair do Sistema</button>
            </nav>
        </aside>

        <main id="content">
            <h2 class="page-title">Arquivamento de Guias</h2>
            <div id="listaParaArquivar"><p>Carregando...</p></div>
        </main>
    </div>

    <div id="modalArquivar" class="modal">
        <div class="modal-content" style="width: 90%; max-width: 800px;">
            <span class="close-btn" id="closeArquivar" style="float: right; cursor: pointer; font-size: 1.5em;">&times;</span>
            <h3 id="tituloModalArquivar" style="margin-bottom: 20px;"></h3>
            <form id="formDadosArquivamento" class="form-grid-arquivar">
                <div class="input-group"><label>Nº Caixa - Localização Guia:</label><input type="text" id="locCaixa" required></div>
                <div class="input-group"><label>Qtd. Páginas PDF:</label><input type="number" id="qtdPaginas" required></div>
                <div class="input-group"><label>Protocolo SEI:</label><input type="text" id="protocoloSei" required></div>
                <div class="input-group"><label>Tipo Anexo:</label><select id="tipoAnexo"><option>Nenhum</option><option>CD</option><option>DVD</option><option>Outro</option></select></div>
                <div class="input-group"><label>Páginas Anexo:</label><input type="number" id="paginasAnexo" value="0"></div>
                <div class="input-group"><label>Data Digitalização:</label><input type="date" id="dataDigitalizacao" required></div>
                <div class="input-group" style="grid-column: span 2;"><label>Observação:</label><textarea id="obsArquivamento"></textarea></div>
                <button type="submit" class="btn-primary" style="grid-column: span 2; background:#27ae60;">Confirmar Arquivamento</button>
            </form>
        </div>
    </div>

    <script type="module">
        import { db, auth } from "./firebase.js";
        import { collection, getDocs, updateDoc, doc, query, where } from "https://www.gstatic.com/firebasejs/12.9.0/firebase-firestore.js";
        import { onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/12.9.0/firebase-auth.js";

        let guiaAtualId = "";

        onAuthStateChanged(auth, (user) => { if (!user) window.location.href = "index.html"; });
        document.getElementById("btnLogout").onclick = () => signOut(auth);

        async function carregar() {
            const container = document.getElementById("listaParaArquivar");
            const q = query(collection(db, "guias"), where("status", "!=", "Arquivada"));
            const snap = await getDocs(q);
            container.innerHTML = "";
            snap.forEach(d => {
                const g = d.data();
                const num = g.numeroGuia || g.numero || "S/N";
                const div = document.createElement("div");
                div.className = "guia-card-arquivar";
                div.innerHTML = `<div><strong>Guia ${num}</strong><br>${g.unidade}</div>
                <button class="btn-ver" onclick="abrirArq('${d.id}', '${num}')" style="background:#27ae60; color:white; padding:10px; border:none; border-radius:4px; cursor:pointer;">📁 Arquivar</button>`;
                container.appendChild(div);
            });
        }

        window.abrirArq = (id, num) => {
            guiaAtualId = id;
            document.getElementById("tituloModalArquivar").innerText = "Arquivar Guia " + num;
            document.getElementById("modalArquivar").style.display = "block";
        };

        document.getElementById("formDadosArquivamento").onsubmit = async (e) => {
            e.preventDefault();
            const dados = {
                status: "Arquivada",
                locCaixaFinal: document.getElementById("locCaixa").value,
                paginasPdf: document.getElementById("qtdPaginas").value,
                protocoloSei: document.getElementById("protocoloSei").value,
                dataArquivamentoSistema: new Date().toLocaleDateString(),
                arquivadoPor: auth.currentUser.email,
                tipoAnexo: document.getElementById("tipoAnexo").value,
                observacao: document.getElementById("obsArquivamento").value
            };
            await updateDoc(doc(db, "guias", guiaAtualId), dados);
            alert("Guia Arquivada!");
            location.reload();
        };

        document.getElementById("closeArquivar").onclick = () => document.getElementById("modalArquivar").style.display = "none";
        carregar();
    </script>
</body>
</html>
