<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Consulta Acervo - NUDOF</title>
    <link rel="stylesheet" href="style.css">
    <style>
        .guia-card-arquivada {
            background: white; border-radius: 8px; padding: 15px; margin-bottom: 10px;
            display: flex; justify-content: space-between; align-items: center; border-left: 5px solid #7f8c8d;
        }
    </style>
</head>
<body>
    <div id="appInterface" style="display: flex;">
        <aside id="sidebar">
            <div class="logo">SISTEMA NUDOF</div>
            <nav>
                <a href="index.html">🏠 Início</a>
                <a href="documentosArquivados.html" style="background:#d0d0d0; font-weight:bold;">📚 Guias Arquivadas</a>
            </nav>
        </aside>
        <main id="content">
            <h2 class="page-title">📚 Guias Arquivadas</h2>
            <div id="listaArquivados"></div>
        </main>
    </div>

    <script type="module">
        import { db, auth } from "./firebase.js";
        import { collection, getDocs, query, where } from "https://www.gstatic.com/firebasejs/12.9.0/firebase-firestore.js";
        import { onAuthStateChanged } from "https://www.gstatic.com/firebasejs/12.9.0/firebase-auth.js";

        async function carregar() {
            const container = document.getElementById("listaArquivados");
            const q = query(collection(db, "guias"), where("status", "==", "Arquivada"));
            const snap = await getDocs(q);
            container.innerHTML = "";
            snap.forEach(d => {
                const g = d.data();
                const div = document.createElement("div");
                div.className = "guia-card-arquivada";
                div.innerHTML = `
                    <div><strong>Guia ${g.numeroGuia || g.numero}</strong><br>
                    <small>Arquivado por: ${g.arquivadoPor || 'N/A'} em ${g.dataArquivamentoSistema || '--'}</small></div>
                    <div style="background:#eee; padding:5px; border-radius:4px;">📦 Caixa: ${g.locCaixaFinal || 'S/N'}</div>
                `;
                container.appendChild(div);
            });
        }
        onAuthStateChanged(auth, (user) => { if (user) carregar(); else window.location.href="index.html"; });
    </script>
</body>
</html>
