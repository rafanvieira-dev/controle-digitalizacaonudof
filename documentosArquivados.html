<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Consulta Acervo - NUDOF</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.28/jspdf.plugin.autotable.min.js"></script>
</head>
<body>
    <div id="appInterface">
        <aside id="sidebar">
            <div class="sidebar-logo">CONTROLE NUDOF</div>
            <nav>
                <a href="index.html">🏠 Início</a>
                <a href="guia.html">➕ Nova Guia</a>
                <a href="documentos.html">📄 Inserir Documentos</a>
                <a href="documentosRecebidos.html">📁 Arquivar Guia</a>
                <a href="documentosArquivados.html" class="ativo">📚 Guias Arquivadas</a>
            </nav>
        </aside>

        <main id="content">
            <h2 class="page-title">Consulta de Acervo Digitalizado</h2>
            <div class="filtros-relatorio" style="background:#fff; padding:20px; border-radius:8px; margin-bottom:20px;">
                <label>Data Início:</label> <input type="date" id="filtroDataInicio">
                <label>Data Fim:</label> <input type="date" id="filtroDataFim">
                <button id="btnGerarRelatorio" class="btn-primary" style="width:auto; padding:10px 20px;">📄 Gerar PDF de Auditoria</button>
            </div>
            <div id="listaArquivados"></div>
        </main>
    </div>

    <script type="module">
        import { db } from "./firebase.js";
        import { collection, getDocs, query, where } from "https://www.gstatic.com/firebasejs/12.9.0/firebase-firestore.js";

        const carregar = async () => {
            const q = query(collection(db, "guias"), where("status", "==", "Arquivada"));
            const snap = await getDocs(q);
            const container = document.getElementById("listaArquivados");
            container.innerHTML = "";

            snap.forEach(g => {
                const d = g.data();
                const card = document.createElement("div");
                card.className = "guia-card-arquivada";
                card.style = "background: white; padding: 15px; margin-bottom: 10px; border-radius: 8px; border-left: 5px solid #7f8c8d; display: flex; justify-content: space-between;";
                card.innerHTML = `
                    <div>
                        <strong>Guia: ${d.numero}</strong> | Unidade: ${d.unidade}<br>
                        <small>Arquivado em: ${d.dataArquivamentoSistema} por ${d.arquivadoPor}</small>
                    </div>
                    <div class="badge-local">Caixa: ${d.locCaixaFinal}</div>
                `;
                container.appendChild(card);
            });
        };

        document.getElementById("btnGerarRelatorio").onclick = async () => {
            const { jsPDF } = window.jspdf;
            const docPdf = new jsPDF('l', 'mm', 'a4'); // Paisagem para caber tudo
            
            const q = query(collection(db, "guias"), where("status", "==", "Arquivada"));
            const snap = await getDocs(q);
            let dadosTabela = [];

            for (const gDoc of snap.docs) {
                const g = gDoc.data();
                const docsSnap = await getDocs(collection(db, "guias", gDoc.id, "documentos"));
                
                docsSnap.forEach(docItem => {
                    const dd = docItem.data();
                    dadosTabela.push([
                        g.numero,
                        dd.nomeDocumento,
                        dd.numeroProcesso, // SEI Origem
                        dd.protocoloSeiDigitalizado || 'N/A', // SEI Digitalizado
                        dd.paginasPdf,
                        dd.tipoAnexo,
                        g.dataArquivamentoSistema,
                        g.arquivadoPor,
                        dd.observacaoDigitalizacao || ''
                    ]);
                });
            }

            docPdf.text("RELATÓRIO DE AUDITORIA DE DIGITALIZAÇÃO - NUDOF", 14, 15);
            docPdf.autoTable({
                startY: 20,
                head: [['Guia', 'Documento', 'SEI Origem', 'SEI Dig.', 'Pgs', 'Anexo', 'Data', 'Responsável', 'Obs']],
                body: dadosTabela,
                styles: { fontSize: 7 }
            });

            docPdf.save("Relatorio_NUDOF.pdf");
        };

        carregar();
    </script>
</body>
</html>
