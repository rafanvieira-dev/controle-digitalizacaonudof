<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Consulta Acervo - NUDOF</title>
    <link rel="stylesheet" href="style.css">
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.28/jspdf.plugin.autotable.min.js"></script>

    <style>
        .guia-card-arquivada {
            background: white; border-radius: 8px; padding: 15px; margin-bottom: 10px;
            display: flex; justify-content: space-between; align-items: center; 
            border-left: 6px solid #7f8c8d; box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }
        .data-header-btn {
            width: 100%; background: #003366; color: white; padding: 12px;
            border: none; border-radius: 5px; text-align: left; font-weight: bold;
            margin: 15px 0 5px 0; cursor: pointer; display: flex; justify-content: space-between;
            align-items: center;
        }
        .data-header-btn:hover { background: #004080; }
        
        /* Estilo do Contador */
        .contador-guias {
            background: #27ae60; color: white; padding: 2px 10px; border-radius: 12px;
            font-size: 0.85em; margin-left: 10px; font-weight: normal;
        }

        .grupo-guias { display: none; margin-bottom: 20px; transition: all 0.3s ease; }
        
        .info-box strong { color: #003366; font-size: 1.1em; }
        .badge-user { font-size: 0.75em; color: #666; display: block; margin-top: 5px; }
        .badge-local { background: #e8f4fd; color: #003366; padding: 8px; border-radius: 4px; font-weight: bold; font-size: 0.85em; }
        .filtros-relatorio { background: #fff; padding: 20px; border-radius: 8px; margin-bottom: 20px; display: flex; gap: 15px; align-items: flex-end; border: 1px solid #ddd; }
    </style>
</head>
<body>
    <div id="appInterface">
        <aside id="sidebar">
            <div class="sidebar-logo">CONTROLE DIGITALIZAÇÃO DE DOCUMENTOS NUDOF</div>
            <nav>
                <a href="index.html">🏠 Início / Histórico</a>
                <a href="guia.html">➕ Nova Guia</a>
                <a href="documentos.html">📄 Inserir Documentos</a>
                <a href="documentosRecebidos.html">📁 Arquivar Guia</a>
                <a href="documentosArquivados.html" class="ativo">📚 Guias Arquivadas</a>
                <button id="btnLogout" class="btn-sair">🚪 Sair do Sistema</button>
            </nav>
        </aside>

        <main id="content">
            <h2 class="page-title">Consulta de Acervo por Data</h2>

            <div class="filtros-relatorio">
                <div>
                    <label>📅 Data Inicial:</label>
                    <input type="date" id="dataInicioRel">
                </div>
                <div>
                    <label>📅 Data Final:</label>
                    <input type="date" id="dataFimRel">
                </div>
                <button class="btn-primary" onclick="window.gerarPDF()" style="width: auto; padding: 10px 20px;">📄 Gerar Relatório PDF</button>
            </div>

            <div id="listaArquivadas"><p>Buscando acervo...</p></div>
        </main>
    </div>

    <div id="modalDetalhes" class="modal">
        <div class="modal-content" style="width: 95%; max-width: 1250px;">
            <span class="close-btn" id="closeModal" style="float: right; cursor: pointer; font-size: 1.5em;">&times;</span>
            <h3 id="modalTitulo" style="color: #003366; margin-bottom: 15px;"></h3>
            <div id="detalhesGuiaGrid"></div>
        </div>
    </div>

    <script type="module">
        import { db, auth } from "./firebase.js";
        import { collection, getDocs, query, where, doc, getDoc } from "https://www.gstatic.com/firebasejs/12.9.0/firebase-firestore.js";
        import { onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/12.9.0/firebase-auth.js";

        let todasAsGuiasArquivadas = [];

        onAuthStateChanged(auth, (user) => { if (!user) window.location.href = "index.html"; else carregar(); });
        document.getElementById("btnLogout").onclick = () => signOut(auth);

        async function carregar() {
            const container = document.getElementById("listaArquivadas");
            try {
                const q = query(collection(db, "guias"), where("status", "==", "Arquivada"));
                const snap = await getDocs(q);
                
                if(snap.empty) { 
                    container.innerHTML = "<p>Nenhuma guia arquivada encontrada no acervo.</p>"; 
                    return; 
                }

                todasAsGuiasArquivadas = [];
                snap.forEach(d => todasAsGuiasArquivadas.push({ id: d.id, ...d.data() }));

                // Ordena por data (mais recente primeiro)
                todasAsGuiasArquivadas.sort((a, b) => {
                    const dataA = a.dataArquivamentoSistema.split('/').reverse().join('');
                    const dataB = b.dataArquivamentoSistema.split('/').reverse().join('');
                    return dataB.localeCompare(dataA);
                });

                // Primeiro, vamos contar quantas guias existem por data
                const contagemPorData = {};
                todasAsGuiasArquivadas.forEach(g => {
                    contagemPorData[g.dataArquivamentoSistema] = (contagemPorData[g.dataArquivamentoSistema] || 0) + 1;
                });

                container.innerHTML = "";
                let dataAtual = "";
                let divGrupoAtual = null;

                todasAsGuiasArquivadas.forEach(g => {
                    if (g.dataArquivamentoSistema !== dataAtual) {
                        dataAtual = g.dataArquivamentoSistema;
                        const dataParaOId = dataAtual.replace(/\//g, '-');
                        const totalNoDia = contagemPorData[dataAtual];
                        
                        const btnData = document.createElement("button");
                        btnData.className = "data-header-btn";
                        btnData.innerHTML = `
                            <div>
                                <span>📅 Arquivadas em: ${dataAtual}</span>
                                <span class="contador-guias">${totalNoDia} ${totalNoDia > 1 ? 'guias' : 'guia'}</span>
                            </div>
                            <span>➕</span>`;
                        
                        divGrupoAtual = document.createElement("div");
                        divGrupoAtual.className = "grupo-guias";
                        divGrupoAtual.id = `grupo-${dataParaOId}`;
                        
                        btnData.onclick = () => {
                            const target = document.getElementById(`grupo-${dataParaOId}`);
                            const icon = btnData.querySelector('span:last-child');
                            if (target.style.display === "block") {
                                target.style.display = "none";
                                icon.innerText = "➕";
                            } else {
                                target.style.display = "block";
                                icon.innerText = "➖";
                            }
                        };

                        container.appendChild(btnData);
                        container.appendChild(divGrupoAtual);
                    }

                    const div = document.createElement("div");
                    div.className = "guia-card-arquivada";
                    div.innerHTML = `
                        <div class="info-box">
                            <strong>Guia: ${g.numero || g.numeroGuia}</strong><br>
                            <small>Unidade: ${g.unidade}</small><br>
                            <span class="badge-user">👤 Responsável: ${g.arquivadoPor || '---'}</span>
                        </div>
                        <div style="text-align: right; display: flex; align-items: center; gap: 15px;">
                            <div class="badge-local">📦 G: ${g.locCaixaFinal} / D: ${g.locCaixaDocumentos}</div>
                            <button class="btn-ver" onclick="window.verDetalhes('${g.id}', '${g.numero || g.numeroGuia}')" style="background:#34495e; color:white; padding:8px 12px; border:none; border-radius:4px; cursor:pointer;">👁 Ver Auditoria</button>
                        </div>`;
                    divGrupoAtual.appendChild(div);
                });
            } catch (err) { 
                console.error(err);
                container.innerHTML = "Erro ao carregar acervo."; 
            }
        }

        window.verDetalhes = async (id, num) => {
            const grid = document.getElementById("detalhesGuiaGrid");
            document.getElementById("modalTitulo").innerText = "Auditoria Detalhada - Guia " + num;
            document.getElementById("modalDetalhes").style.display = "block";
            grid.innerHTML = "Carregando...";

            try {
                const gSnap = await getDoc(doc(db, "guias", id));
                const g = gSnap.data();
                const docsSnap = await getDocs(collection(db, "guias", id, "documentos"));
                
                let html = `
                    <div style="margin-bottom:20px; padding:15px; background:#f8f9fa; border-radius:8px; border:1px solid #ddd; display:grid; grid-template-columns: 1fr 1fr; gap:10px;">
                        <div><b>👤 Guia Criada por:</b> ${g.criadoPor || '--'}</div>
                        <div><b>👤 Digitalizada por:</b> ${g.arquivadoPor || '--'}</div>
                        <div><b>📦 Caixa da Guia:</b> ${g.locCaixaFinal || '--'}</div>
                        <div><b>📦 Caixa de Documentos:</b> ${g.locCaixaDocumentos || '--'}</div>
                    </div>
                    <table style="width:100%; border-collapse: collapse; font-size:12px;">
                    <thead><tr style="background:#003366; color:white;">
                        <th style="padding:10px; border:1px solid #ddd;">Documento</th>
                        <th style="padding:10px; border:1px solid #ddd;">Inserido por</th>
                        <th style="padding:10px; border:1px solid #ddd;">Protocolo SEI</th>
                        <th style="padding:10px; border:1px solid #ddd;">Anexo</th>
                        <th style="padding:10px; border:1px solid #ddd;">Obs. Digitalização</th>
                    </tr></thead><tbody>`;

                docsSnap.forEach(docItem => {
                    const d = docItem.data();
                    const anexoStr = d.tipoAnexo && d.tipoAnexo !== "Nenhum" ? `<b>${d.tipoAnexo}</b> (${d.qtdPagsAnexo} pgs)` : "Nenhum";
                    html += `<tr>
                        <td style="padding:10px; border:1px solid #ddd;"><b>${d.nomeDocumento}</b><br><small>${d.numeroProcesso}</small></td>
                        <td style="padding:10px; border:1px solid #ddd;">${d.inseridoPor || '--'}</td>
                        <td style="padding:10px; border:1px solid #ddd; color:#27ae60; font-weight:bold;">${d.protocoloSeiDigitalizado || '--'}</td>
                        <td style="padding:10px; border:1px solid #ddd;">${anexoStr}</td>
                        <td style="padding:10px; border:1px solid #ddd;">${d.observacaoDigitalizacao || '--'}</td>
                    </tr>`;
                });
                grid.innerHTML = html + "</tbody></table>";
            } catch (e) { grid.innerHTML = "Erro ao carregar detalhes."; }
        };

        window.gerarPDF = async function() {
            const dataInicio = document.getElementById("dataInicioRel").value;
            const dataFim = document.getElementById("dataFimRel").value;
            if (!dataInicio || !dataFim) return alert("Selecione o período.");

            const { jsPDF } = window.jspdf;
            const docPdf = new jsPDF('landscape');
            const dIni = new Date(dataInicio);
            const dFim = new Date(dataFim);
            dFim.setHours(23, 59, 59);

            let dadosTabela = [];
            for (let g of todasAsGuiasArquivadas) {
                const partes = g.dataArquivamentoSistema.split('/');
                const dataG = new Date(partes[2], partes[1] - 1, partes[0]);

                if (dataG >= dIni && dataG <= dFim) {
                    const docsSnap = await getDocs(collection(db, "guias", g.id, "documentos"));
                    docsSnap.forEach(dItem => {
                        const dd = dItem.data();
                        dadosTabela.push([
                            g.numero || g.numeroGuia,
                            dd.nomeDocumento,
                            dd.protocoloSeiDigitalizado || '--',
                            g.criadoPor || '--',
                            dd.inseridoPor || '--',
                            g.arquivadoPor || '--',
                            g.dataArquivamentoSistema,
                            `G:${g.locCaixaFinal}\nD:${g.locCaixaDocumentos}`,
                            dd.observacaoDigitalizacao || ''
                        ]);
                    });
                }
            }

            if (dadosTabela.length === 0) return alert("Nenhum dado encontrado.");

            docPdf.setFontSize(14);
            docPdf.text("NUDOF - RELATÓRIO DE AUDITORIA", 14, 15);
            docPdf.autoTable({
                startY: 25,
                head: [['Guia', 'Documento', 'Prot. SEI', 'Criador', 'Inserido', 'Digitalizador', 'Data Arq.', 'Caixas', 'Observação']],
                body: dadosTabela,
                theme: 'striped',
                styles: { fontSize: 6 }
            });
            docPdf.save(`Auditoria_NUDOF_${dataInicio}.pdf`);
        };

        document.getElementById("closeModal").onclick = () => document.getElementById("modalDetalhes").style.display = "none";
    </script>
</body>
</html>
