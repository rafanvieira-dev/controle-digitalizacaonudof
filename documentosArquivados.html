<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Guias Arquivadas - NUDOF</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="app-container">
        <aside class="sidebar">
            <div class="sidebar-header">NUDOF DIGITAL</div>
            <nav></nav>
        </aside>
        <main class="main-content">
            <h2 class="page-title">Consulta de Guias Arquivadas</h2>
            <div id="listaArquivados"></div>
        </main>
    </div>

    <script type="module">
        import { db } from "./firebase.js";
        import { collection, getDocs } from "https://www.gstatic.com/firebasejs/12.9.0/firebase-firestore.js";

        async function carregarArquivados() {
            const container = document.getElementById("listaArquivados");
            const snapshot = await getDocs(collection(db, "guias"));
            let arquivadas = [];

            snapshot.forEach(doc => {
                const d = doc.data();
                if(d.status === "Arquivada") arquivadas.push(d);
            });

            // Ordenar por data de arquivamento (Mais recente primeiro)
            arquivadas.sort((a, b) => new Date(b.dataArquivamento) - new Date(a.dataArquivamento));

            const agrupado = arquivadas.reduce((acc, g) => {
                const data = g.dataArquivamento || "Antigas";
                if (!acc[data]) acc[data] = [];
                acc[data].push(g);
                return acc;
            }, {});

            container.innerHTML = "";
            for (const data in agrupado) {
                let html = `<div class="data-group-header">Arquivadas em: ${data}</div>
                <table class="excel-table">
                    <thead><tr><th>Guia</th><th>Unidade</th><th>Caixa</th></tr></thead><tbody>`;
                agrupado[data].forEach(g => {
                    html += `<tr><td>${g.numero}</td><td>${g.unidade}</td><td>${g.caixa || '-'}</td></tr>`;
                });
                container.innerHTML += html + "</tbody></table>";
            }
        }
        carregarArquivados();
    </script>
</body>
</html>
