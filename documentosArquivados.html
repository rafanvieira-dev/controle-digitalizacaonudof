<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Consulta Acervo - NUDOF</title>
    <link rel="stylesheet" href="style.css">
    <style>
        .guia-card-arquivada {
            background: white; border-radius: 8px; padding: 20px; margin-bottom: 15px;
            display: flex; justify-content: space-between; align-items: center; 
            border-left: 6px solid #7f8c8d; box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }
        .info-box { flex-grow: 1; }
        .info-box strong { color: #003366; font-size: 1.1em; }
        .badge-local { background: #e8f4fd; color: #003366; padding: 5px 10px; border-radius: 4px; font-weight: bold; font-size: 0.9em; }
        .btn-ver-itens { background: #4682B4; color: white; border: none; padding: 10px 15px; border-radius: 5px; cursor: pointer; font-weight: bold; margin-left: 15px; }
        .btn-ver-itens:hover { background: #35668d; }
    </style>
</head>
<body>
    <div id="appInterface" style="display: flex;">
        <aside id="sidebar">
            <div class="logo">SISTEMA NUDOF</div>
            <nav>
                <a href="index.html">🏠 Início / Histórico</a>
                <a href="guia.html">➕ Inserir Nova Guia</a>
                <a href="documentos.html">📄 Documentos em Guia</a>
                <a href="documentosRecebidos.html">📁 Arquivar Guia</a>
                <a href="documentosArquivados.html" style="background-color: #d0d0d0; font-weight: bold;">📚 Guias Arquivadas</a>
                <button id="btnLogout" style="color: #e74c3c; background:none; border:none; border-top: 1px solid #ccc; margin-top: auto; padding: 15px; cursor:pointer; width: 100%; text-align: left;">🚪 Sair</button>
            </nav>
        </aside>

        <main id="content">
            <h2 class="page-title">📚 Acervo de Guias Arquivadas</h2>
            <p style="margin-bottom: 20px; color: #666;">Consulta de processos digitalizados e localização física no arquivo.</p>
            
            <div id="listaArquivados">
                <p>Carregando acervo...</p>
            </div>
        </main>
    </div>

    <div id="modalDetalhes" class="modal">
        <div class="modal-content" style="width: 80%; max-width: 900px;">
            <span class="close-btn" id="closeModal">&times;</span>
            <h3 id="modalTitulo" style="color: #003366; border-bottom: 2px solid #eee; padding-bottom: 10px; margin-bottom: 15px;"></h3>
            
            <div id="detalhesTecnicos" style="background: #f9f9f9; padding: 15px; border-radius: 8px; margin-bottom: 20px; display: grid; grid-template-columns: 1fr 1fr; gap: 10px; font-size: 0.9em;">
                </div>

            <h4>Documentos da Guia:</h4>
            <div id="modalCorpo"></div>
        </div>
    </div>

    <script type="module">
        import { db, auth } from "./firebase.js";
        import { collection, getDocs, query, where, doc, getDoc } from "https://www.gstatic.com/firebasejs/12.9.0/firebase-firestore.js";
        import { onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/12.9.0/firebase-auth.js";

        // Proteção de Rota
        onAuthStateChanged(auth, (user) => {
            if (!user) window.location.href = "index.html";
            else carregarArquivados();
        });

        document.getElementById("btnLogout").onclick = () => signOut(auth);

        async function carregarArquivados() {
            const container = document.getElementById("listaArquivados");
            try {
                // Busca apenas as arquivadas
                const q = query(collection(db, "guias"), where("status", "==", "Arquivada"));
                const snap = await getDocs(q);
                
                if (snap.empty) {
                    container.innerHTML = "<p>Nenhuma guia arquivada encontrada.</p>";
                    return;
                }

                let guias = [];
                snap.forEach(d => guias.push({ id: d.id, ...d.data() }));
                
                // Ordenar por número decrescente
                guias.sort((a, b) => parseInt(b.numeroGuia || b.numero) - parseInt(a.numeroGuia || a.numero));

                container.innerHTML = "";
                guias.forEach(g => {
                    const num = g.numeroGuia || g.numero || "S/N";
                    const card = document.createElement("div");
                    card.className = "guia-card-arquivada";
                    card.innerHTML = `
                        <div class="info-box">
                            <strong>Guia Nº ${num}</strong><br>
                            <small>Unidade: ${g.unidade}</small><br>
                            <small>Arquivado em: ${g.dataArquivamentoSistema || '--'}</small>
                        </div>
                        <div class="badge-local">📦 ${g.locCaixaFinal || 'S/Local'}</div>
                        <button class="btn-ver-itens" onclick="verTudo('${g.id}', '${num}')">👁 Ver Documentos</button>
                    `;
                    container.appendChild(card);
                });
            } catch (err) {
                container.innerHTML = "<p>Erro ao carregar o acervo.</p>";
            }
        }

        // Função para abrir detalhes completos e documentos
        window.verTudo = async (id, num) => {
            const modal = document.getElementById("modalDetalhes");
            const grid = document.getElementById("detalhesTecnicos");
            const corpo = document.getElementById("modalCorpo");
            
            document.getElementById("modalTitulo").innerText = "Prontuário da Guia " + num;
            modal.style.display = "block";
            grid.innerHTML = "Carregando detalhes...";
            corpo.innerHTML = "";

            try {
                // 1. Pegar dados da guia
                const guiaSnap = await getDoc(doc(db, "guias", id));
                const g = guiaSnap.data();
                
                grid.innerHTML = `
                    <div><strong>Localização Física:</strong> ${g.locCaixaFinal || '---'}</div>
                    <div><strong>Processo SEI:</strong> ${g.protocoloSei || '---'}</div>
                    <div><strong>Qtd Páginas:</strong> ${g.paginasPdf || '0'}</div>
                    <div><strong>Data Digitalização:</strong> ${g.dataDigitalizacao || '---'}</div>
                    <div><strong>Arquivado por:</strong> ${g.arquivadoPor || 'Sistema'}</div>
                    <div><strong>Observações:</strong> ${g.observacao || 'Nenhuma'}</div>
                `;

                // 2. Pegar subcoleção de documentos
                const docsSnap = await getDocs(collection(db, "guias", id, "documentos"));
                if (docsSnap.empty) {
                    corpo.innerHTML = "<p>Esta guia não possui documentos listados.</p>";
                } else {
                    let html = `<table class="sei-table" style="width:100%; border-collapse:collapse;">
                        <thead><tr style="background:#eee;">
                            <th style="padding:10px; border:1px solid #ddd;">Documento</th>
                            <th style="padding:10px; border:1px solid #ddd;">Nº Processo SEI</th>
                        </tr></thead><tbody>`;
                    
                    docsSnap.forEach(docItem => {
                        const d = docItem.data();
                        html += `<tr>
                            <td style="padding:10px; border:1px solid #ddd;">${d.nomeDocumento}</td>
                            <td style="padding:10px; border:1px solid #ddd;">${d.numeroProcesso}</td>
                        </tr>`;
                    });
                    corpo.innerHTML = html + "</tbody></table>";
                }
            } catch (e) {
                grid.innerHTML = "Erro ao carregar informações.";
            }
        };

        document.getElementById("closeModal").onclick = () => {
            document.getElementById("modalDetalhes").style.display = "none";
        };

    </script>
</body>
</html>
