<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>NUDOF - Sistema de Digitalização</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="loginArea" style="display:flex; flex-direction:column; align-items:center; justify-content:center; width:100%;">
        <h2>Login NUDOF</h2>
        <div style="width:300px;">
            <input type="email" id="email" placeholder="E-mail">
            <input type="password" id="senha" placeholder="Senha">
            <button class="btn-primary" id="btnLogin" style="width:100%;">Entrar</button>
            <p id="erroLogin" style="color:red;"></p>
        </div>
    </div>

    <div id="menuSistema" class="app-container" style="display:none;">
        <aside class="sidebar">
            <div class="sidebar-header">NUDOF DIGITAL</div>
            <nav>
                <a href="index.html">Histórico de Guias</a>
                <a href="guia.html">Nova Guia</a>
                <a href="documentos.html">Inserir Documentos</a>
                <a href="documentosRecebidos.html">Arquivar Guia</a>
                <a href="documentosArquivados.html">Guias Arquivadas</a>
                <button id="btnLogout" class="btn-sair">Sair</button>
            </nav>
        </aside>
        <main class="main-content">
            <h2 class="page-title">Histórico de Guias Ativas</h2>
            <div id="listaHistorico"></div>
        </main>
    </div>

    <script type="module">
        import { auth, db } from "./firebase.js";
        import { signInWithEmailAndPassword, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/12.9.0/firebase-auth.js";
        import { collection, getDocs } from "https://www.gstatic.com/firebasejs/12.9.0/firebase-firestore.js";

        // Login/Logout Logic
        document.getElementById("btnLogin").addEventListener("click", async () => {
            try {
                await signInWithEmailAndPassword(auth, email.value, senha.value);
            } catch (e) { document.getElementById("erroLogin").innerText = "Erro ao acessar."; }
        });

        document.getElementById("btnLogout").addEventListener("click", () => signOut(auth));

        onAuthStateChanged(auth, (user) => {
            if (user) {
                document.getElementById("loginArea").style.display = "none";
                document.getElementById("menuSistema").style.display = "flex";
                carregarHistorico();
            } else {
                document.getElementById("loginArea").style.display = "flex";
                document.getElementById("menuSistema").style.display = "none";
            }
        });

        async function carregarHistorico() {
            const container = document.getElementById("listaHistorico");
            const snapshot = await getDocs(collection(db, "guias"));
            let guias = [];
            
            snapshot.forEach(doc => {
                const d = doc.data();
                if(d.status !== "Arquivada") guias.push(d);
            });

            // Ordenação Decrescente (Data)
            guias.sort((a, b) => new Date(b.dataRecebimento) - new Date(a.dataRecebimento));

            // Agrupamento
            const agrupado = guias.reduce((acc, g) => {
                const data = g.dataRecebimento || "Sem Data";
                if (!acc[data]) acc[data] = [];
                acc[data].push(g);
                return acc;
            }, {});

            container.innerHTML = "";
            for (const data in agrupado) {
                let html = `<div class="data-group-header">Data: ${data}</div><table class="excel-table">
                    <thead><tr><th>Nº Guia</th><th>Unidade</th><th>Status</th></tr></thead><tbody>`;
                agrupado[data].forEach(g => {
                    html += `<tr><td>${g.numero}</td><td>${g.unidade}</td><td>${g.status}</td></tr>`;
                });
                html += "</tbody></table>";
                container.innerHTML += html;
            }
        }
    </script>
</body>
</html>
