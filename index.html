<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Sistema Controle de Digitalização NUDOF</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">
    <header>
        <h1>Sistema Controle de Digitalização NUDOF</h1>
    </header>

    <!-- LOGIN -->
    <div id="loginArea" class="menu">
        <input type="email" id="email" placeholder="Seu email" required>
        <input type="password" id="senha" placeholder="Sua senha" required>
        <button id="btnLogin">Entrar</button>
        <button id="btnCadastrar">Cadastrar</button>
        <p id="erroLogin" style="color:red;"></p>
    </div>

    <!-- MENU SISTEMA -->
    <div id="menuSistema" class="menu" style="display:none;">
        <button onclick="location.href='guia.html'">Nova Guia</button>
        <button onclick="location.href='documentos.html'">Inserir Documentos</button>
        <button onclick="location.href='documentosRecebidos.html'">Arquivar Guias</button>
        <button onclick="location.href='documentosArquivados.html'">Documentos Arquivados</button>
        <button id="btnLogout" class="btn-danger">Sair</button>
    </div>
</div>

<script type="module">
import { auth } from "./firebase.js";
import { 
    signInWithEmailAndPassword, 
    createUserWithEmailAndPassword,
    onAuthStateChanged,
    signOut
} from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";

const loginArea = document.getElementById("loginArea");
const menuSistema = document.getElementById("menuSistema");
const erroLogin = document.getElementById("erroLogin");

const email = document.getElementById("email");
const senha = document.getElementById("senha");

const btnLogin = document.getElementById("btnLogin");
const btnCadastrar = document.getElementById("btnCadastrar");
const btnLogout = document.getElementById("btnLogout");

// Verifica se usuário está logado
onAuthStateChanged(auth, (user) => {
    if (user) {
        loginArea.style.display = "none";
        menuSistema.style.display = "block";
    } else {
        loginArea.style.display = "block";
        menuSistema.style.display = "none";
    }
});

// Login
btnLogin.addEventListener("click", async () => {
    try {
        await signInWithEmailAndPassword(auth, email.value, senha.value);
    } catch (error) {
        erroLogin.textContent = error.message;
    }
});

// Cadastro
btnCadastrar.addEventListener("click", async () => {
    try {
        await createUserWithEmailAndPassword(auth, email.value, senha.value);
        alert("Usuário criado com sucesso!");
    } catch (error) {
        erroLogin.textContent = error.message;
    }
});

// Logout
btnLogout.addEventListener("click", async () => {
    await signOut(auth);
});
</script>

</body>
</html>
