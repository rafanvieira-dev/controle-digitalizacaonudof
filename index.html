<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Controle de Digitalização</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<h1>Controle de Digitalização de Documentos</h1>

<div class="container">

  <!-- CRIAR GUIA -->
  <div class="card">
    <h2>Nova Guia</h2>
    <form id="formGuia">
      <input type="text" id="numeroGuia" placeholder="Número da Guia" required>
      <input type="text" id="unidade" placeholder="Unidade Solicitante" required>
      <input type="date" id="dataRecebimento" required>
      <input type="text" id="responsavel" placeholder="Responsável" required>
      <button type="submit">Criar Guia</button>
    </form>
  </div>

  <!-- GUIAS EM ANDAMENTO -->
  <div class="card">
    <h2>Guias em Andamento</h2>
    <div id="listaGuias"></div>
  </div>

  <!-- GUIAS ARQUIVADAS -->
  <div class="card">
    <h2>Guias Arquivadas</h2>
    <div id="listaArquivadas"></div>
  </div>

</div>

<script src="script.js"></script>
</body>
</html>
