<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CONTROLE DIGITALIZAÇÃO DE DOCUMENTOS NUDOF</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div id="loginSection">
        <div class="login-box" style="background: white; padding: 40px; border-radius: 8px; margin: 50px auto; width: 400px; box-shadow: 0 4px 10px rgba(0,0,0,0.1);">
            <div style="background-color: #003366; color: white; padding: 15px; margin: -40px -40px 30px -40px; border-radius: 8px 8px 0 0; font-weight: bold; text-align: center;">
                CONTROLE DIGITALIZAÇÃO DE DOCUMENTOS NUDOF
            </div>
            <h2 style="text-align: center; margin-bottom: 20px;">Acesso ao Sistema</h2>
            <input type="email" id="email" placeholder="E-mail institucional">
            <input type="password" id="senha" placeholder="Palavra-passe">
            <button id="btnLogin" class="btn-primary">Entrar</button>
        </div>
    </div>

    <div id="appInterface" style="display: none;">
        <aside id="sidebar">
            <div class="sidebar-logo">CONTROLE DE DIGITALIZAÇÃO DE DOCUMENTOS NUDOF</div>
            <nav>
                <a href="index.html" class="ativo">🏠 Início / Histórico</a>
                <a href="guia.html">➕ Nova Guia</a>
                <a href="documentos.html">📄 Inserir Documentos</a>
                <a href="documentosRecebidos.html">📁 Arquivar Guia</a>
                <a href="documentosArquivados.html">📚 Guias Arquivadas</a>
                <button id="btnLogout" class="btn-sair">🚪 Sair do Sistema</button>
            </nav>
        </aside>

        <main id="content">
            <h2 id="pageTitle" class="page-title">Histórico de Guias Ativas</h2>
            <div id="mainDisplay">
                <p>A carregar dados...</p>
            </div>
        </main>
    </div>

    <script type="module" src="app_final.js"></script>
    <div id="modalDetalhes" class="modal">
        <div class="modal-content">
            <span class="close-btn" style="float: right; cursor: pointer; font-size: 1.5em;">&times;</span>
            <h3 id="modalTitulo" style="color: var(--primary); margin-bottom: 15px;"></h3>
            <div id="modalCorpo"></div>
        </div>
    </div>
    <div id="loading" class="loading-overlay">Verificando acesso...</div>
</body>
</html>
