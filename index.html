<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Controle de Guias</title>
</head>
<body>
  <h1>Controle de Guias</h1>

  <button onclick="window.location.href='guia.html'">Criar Nova Guia</button>
  <button onclick="window.location.href='documentos.html'">Documentos</button>
  <button onclick="window.location.href='arquivados.html'">Guias Arquivadas</button>

  <script>
    // Armazenamento no localStorage ou banco de dados
    let guias = JSON.parse(localStorage.getItem("guias")) || [];

    // Exemplo de função para adicionar guia (poderia ser mais avançada)
    function criarGuia(novaGuia) {
      guias.push(novaGuia);
      localStorage.setItem("guias", JSON.stringify(guias));
    }
  </script>
</body>
</html>
