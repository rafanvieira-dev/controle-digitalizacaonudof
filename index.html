<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Sistema Controle de Digitalização NUDOF</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">
    <header>
        <h1>Sistema Controle de Digitalização NUDOF</h1>
    </header>

    <!-- ================= LOGIN ================= -->
    <div id="loginArea" class="menu">

        <form id="formLogin">
            <input type="email" id="email" placeholder="E-mail institucional" required>
            <input type="password" id="senha" placeholder="Senha" required>
            <button type="submit">Entrar</button>
        </form>

        <p id="erroLogin" style="color:red;"></p>

    </div>

    <!-- ================= MENU DO SISTEMA ================= -->
    <div id="menuSistema" class="menu" style="display:none;">
        <button onclick="location.href='guia.html'">Nova Guia</button>
        <button onclick="location.href='documentos.html'">Inserir Documentos</button>
        <button onclick="location.href='documentosRecebidos.html'">Arquivar Guias</button>
        <button onclick="location.href='documentosArquivados.html'">Documentos Arquivados</button>
        <button class="btn-danger" id="btnLogout">Sair</button>
    </div>

</div>

<!-- Firebase -->
<script type="module" src="firebase.js"></script>
<script type="module" src="auth.js"></script>

</body>
</html>
