<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Controle de Guias</title>
  <link rel="stylesheet" href="style.css">
  <style>
    body {
      font-family: Arial, sans-serif;
      background-color: #f5f5f5;
      color: #333;
      text-align: center;
      padding: 20px;
    }

    .container {
      width: 80%;
      margin: 0 auto;
    }

    h1 {
      color: #006747;
      margin-bottom: 20px;
    }

    .pesquisa {
      margin-bottom: 20px;
    }

    .pesquisa input {
      padding: 10px;
      font-size: 16px;
      border: 1px solid #ddd;
      border-radius: 5px;
      width: 300px;
    }

    .guias-lista {
      margin-top: 20px;
      text-align: left;
      list-style: none;
      padding: 0;
    }

    .guias-lista li {
      background-color: #fff;
      padding: 10px;
      margin: 5px 0;
      border: 1px solid #ddd;
      border-radius: 5px;
      cursor: pointer;
    }

    .guias-lista li:hover {
      background-color: #e9e9e9;
    }

    button {
      background-color: #006747;
      color: white;
      padding: 10px 20px;
      border: none;
      border-radius: 5px;
      cursor: pointer;
      margin-top: 20px;
    }

    button:hover {
      background-color: #004d3a;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>Controle de Guias</h1>

    <!-- Barra de Pesquisa -->
    <div class="pesquisa">
      <input type="text" id="numeroGuiaPesquisa" placeholder="Digite o número da guia para pesquisar..." oninput="pesquisarGuia()">
    </div>

    <!-- Lista de Guias -->
    <ul id="listaGuias" class="guias-lista">
      <!-- As guias criadas serão listadas aqui -->
    </ul>

    <button onclick="window.location.href='guia.html'">Criar Nova Guia</button>
    <button onclick="window.location.href='documentos.html'">Documentos</button>
    <button onclick="window.location.href='arquivados.html'">Guias Arquivadas</button>
  </div>

  <script>
    // Recupera as guias do localStorage
    let guias = JSON.parse(localStorage.getItem("guias")) || [];

    // Renderiza a lista de guias criadas na página inicial
    function renderizarGuias() {
      const lista = document.getElementById('listaGuias');
      lista.innerHTML = '';

      guias.forEach(guia => {
        const item = document.createElement('li');
        item.textContent = `Guia nº ${guia.numeroGuia} - Status: ${guia.status}`;
        item.style.cursor = 'pointer';
        item.onclick = () => window.location.href = `documentos.html?numeroGuia=${guia.numeroGuia}`;
        lista.appendChild(item);
      });
    }

    // Função de pesquisa de guia
    function pesquisarGuia() {
      const numeroGuiaPesquisa = document.getElementById("numeroGuiaPesquisa").value.trim().toLowerCase();

      const lista = document.getElementById('listaGuias');
      lista.innerHTML = '';

      guias.filter(g => g.numeroGuia.toLowerCase().includes(numeroGuiaPesquisa)).forEach(guia => {
        const item = document.createElement('li');
        item.textContent = `Guia nº ${guia.numeroGuia} - Status: ${guia.status}`;
        item.style.cursor = 'pointer';
        item.onclick = () => window.location.href = `documentos.html?numeroGuia=${guia.numeroGuia}`;
        lista.appendChild(item);
      });
    }

    renderizarGuias();
  </script>
</body>
</html>
