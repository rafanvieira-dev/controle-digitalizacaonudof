<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Guia - Detalhes</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <h1>Detalhes da Guia</h1>

  <div id="infoGuia">
    <!-- Informações da guia serão exibidas aqui -->
  </div>

  <button onclick="window.location.href='documentos.html'">Adicionar Documentos</button>

  <!-- Exibir status e possibilidade de arquivar -->
  <button id="arquivarBtn" onclick="arquivarGuia()">Arquivar Guia</button>

  <button onclick="window.location.href='index.html'">Voltar</button>

  <script>
    let guias = JSON.parse(localStorage.getItem("guias")) || [];
    const numeroGuia = new URLSearchParams(window.location.search).get("numeroGuia");

    const guia = guias.find(g => g.numeroGuia === numeroGuia);

    if (guia) {
      document.getElementById('infoGuia').innerHTML = `
        <p><strong>Número da Guia:</strong> ${guia.numeroGuia}</p>
        <p><strong>Hora de Entrada:</strong> ${guia.horaEntrada}</p>
        <p><strong>Unidade:</strong> ${guia.unidade}</p>
        <p><strong>Data de Recebimento:</strong> ${guia.dataRecebimento}</p>
        <p><strong>Status:</strong> ${guia.status}</p>
        ${guia.status === "Arquivada" ? `<p><strong>Data de Arquivamento:</strong> ${guia.dataArquivamento}</p><p><strong>Pasta:</strong> ${guia.pasta}</p>` : ''}
      `;
    }

    function arquivarGuia() {
      if (!guia) return;

      if (guia.status === "Arquivada") {
        alert("A guia já está arquivada!");
        return;
      }

      const pasta = prompt("Digite o número da pasta para arquivamento:");
      const dataArquivamento = new Date().toLocaleString();

      guia.status = "Arquivada";
      guia.pasta = pasta;
      guia.dataArquivamento = dataArquivamento;

      // Atualiza o localStorage com a guia arquivada
      const index = guias.findIndex(g => g.numeroGuia === guia.numeroGuia);
      guias[index] = guia;
      localStorage.setItem("guias", JSON.stringify(guias));

      alert("Guia arquivada com sucesso!");
      window.location.reload(); // Atualiza a página
    }
  </script>
</body>
</html>
